<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Production-ready form with Supabase integration and modern UI.">
    <title>Modern Form | Supabase Static</title>
    
    <!-- Relative CSS Link -->
    <link rel="stylesheet" href="./style.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Relative Script Link with Defer -->
    <script src="./script.js" defer></script>
</head>
<body class="light-mode">
    <div class="background-blob"></div>
    <div class="container">
        <header>
            <div class="logo-area">
                <h1>Registration Portal</h1>
                <p class="subtitle">Complete your application securely</p>
            </div>
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle Dark Mode">
                <i data-lucide="sun" id="sun-icon"></i>
                <i data-lucide="moon" id="moon-icon" style="display: none;"></i>
            </button>
        </header>

        <main>
            <!-- Form Card -->
            <div id="form-card" class="card">
                <form id="registration-form">
                    <div class="form-group">
                        <label for="full_name">Full Name</label>
                        <input type="text" id="full_name" name="full_name" placeholder="John Doe" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="john@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone" placeholder="1234567890" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="date_of_birth">Date of Birth</label>
                            <input type="date" id="date_of_birth" name="date_of_birth" required>
                        </div>
                        <div class="form-group">
                            <label for="gender">Gender</label>
                            <select id="gender" name="gender" required>
                                <option value="" disabled selected>Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="address">Full Address</label>
                        <textarea id="address" name="address" rows="3" placeholder="Enter your full residential address" required></textarea>
                    </div>

                    <div class="form-group">
                        <label class="file-label">Supporting Document</label>
                        <div class="upload-container">
                            <label for="file" class="custom-file-upload">
                                <i data-lucide="upload-cloud"></i>
                                <span>Click to upload or drag and drop</span>
                                <small>PDF, JPG, PNG (Max 5MB)</small>
                            </label>
                            <input id="file" type="file" name="file" required />
                            <div id="file-name" class="file-info">No file selected</div>
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="reset" id="reset-btn" class="btn-secondary">Reset</button>
                        <button type="submit" id="submit-btn" class="btn-primary">Submit Application</button>
                    </div>
                </form>
            </div>

            <!-- Success Card -->
            <div id="preview-card" class="card" style="display: none;">
                <div class="success-banner">
                    <div class="success-icon-wrap">
                        <i data-lucide="check-circle" class="success-icon"></i>
                    </div>
                    <h2>Application Received!</h2>
                    <p>Your details have been successfully saved.</p>
                </div>
                
                <div class="preview-content" id="preview-data">
                    <!-- Data will be injected here by JS -->
                </div>

                <div class="button-group single">
                    <button id="edit-btn" class="btn-primary">Submit Another Response</button>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Modern Form Service. Secured by Supabase.</p>
        </footer>
    </div>

    <script>
        // Initialize Lucide icons immediately for better UX
        lucide.createIcons();
    </script>
</body>
</html>
